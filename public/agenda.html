    <script>
      (() => {
        const agendaImage = document.getElementById("agenda-image")
        const tabButtons = Array.from(document.querySelectorAll(".agenda-tab-btn"))
        if (!agendaImage || tabButtons.length === 0) return

        const tabData = {
          day1: { src: "./assets/day1.webp", alt: "Agenda Day 1" },
          day2: { src: "./assets/day2.webp", alt: "Agenda Day 2" },
        }

        const activeBtnClass = "bg-[rgb(122,200,68)] text-white shadow-sm"
        const inactiveBtnClass = "bg-[#f3f4f6] text-[#4b5563]"

        const setActiveTab = (tabKey) => {
          const nextData = tabData[tabKey]
          if (!nextData) return

          tabButtons.forEach((button) => {
            const isActive = button.dataset.agendaTab === tabKey
            button.setAttribute("aria-selected", String(isActive))
            button.classList.toggle("bg-[rgb(122,200,68)]", isActive)
            button.classList.toggle("text-white", isActive)
            button.classList.toggle("shadow-sm", isActive)
            button.classList.toggle("bg-[#f3f4f6]", !isActive)
            button.classList.toggle("text-[#4b5563]", !isActive)
          })

          agendaImage.classList.remove("opacity-100")
          agendaImage.classList.add("opacity-0")

          window.setTimeout(() => {
            agendaImage.src = nextData.src
            agendaImage.alt = nextData.alt
            window.requestAnimationFrame(() => {
              agendaImage.classList.remove("opacity-0")
              agendaImage.classList.add("opacity-100")
            })
          }, 120)
        }

        tabButtons.forEach((button) => {
          button.classList.add(...activeBtnClass.split(" "))
          button.classList.remove(...inactiveBtnClass.split(" "))
          if (button.getAttribute("aria-selected") === "false") {
            button.classList.remove(...activeBtnClass.split(" "))
            button.classList.add(...inactiveBtnClass.split(" "))
          }
          button.addEventListener("click", () => setActiveTab(button.dataset.agendaTab))
        })
      })()
    </script>
    <script src="./js/ricmh-legacy.js" defer></script>
